{% extends "base.html" %}
{% block content %}
<h2>{{ title }}</h2>
<form method="post" class="card">
  <label>{{ role_label }} Username
    <input name="username" required placeholder="e.g., librarian2">
  </label>
  <button type="submit">Remove {{ role_label }}</button>
</form>
<p><a href="{{ url_for('admin_users') }}">← Back to Manage Users</a></p>
{% endblock %}
